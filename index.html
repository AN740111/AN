const bin=atob(b64);
const u8=new Uint8Array(bin.length);
for(let i=0;i<bin.length;i++)u8[i]=bin.charCodeAt(i);
const ds=new DecompressionStream("gzip");
const w=ds.writable.getWriter();
w.write(u8);w.close();
const out=[];
const r=ds.readable.getReader();
while(true){const{done,value}=await r.read();if(done)break;out.push(value);}
const total=out.reduce((a,b)=>a+b.length,0);
const res=new Uint8Array(total);
let off=0;for(const c of out){res.set(c,off);off+=c.length;}
const html=new TextDecoder().decode(res);
document.open();document.write(html);document.close();
